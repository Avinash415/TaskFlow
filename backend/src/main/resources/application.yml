spring:
  application:
    name: taskflow-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/taskflow
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate  # Change to 'validate' after Flyway
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8080

jwt:
  secret: "YourSuperSecretJWTKeyForTaskFlow2026AtLeast256BitsLongChangeInProd!!!"
  expiration: 86400000     # 24 hours
  refresh-expiration: 604800000  # 7 days

app:
  frontend-url: http://localhost:3000